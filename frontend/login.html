<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>로그인 · TaskFlow</title>
<script>
  (function () {
    var t = localStorage.getItem('theme');
    if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    if (t === 'dark') document.documentElement.classList.add('dark');
  })();
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class' };</script>
<link rel="stylesheet" href="/css/theme.css" />
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <button id="theme-toggle-btn" class="theme-toggle fixed top-5 right-5 z-20" aria-label="테마 전환">🌙</button>

  <div class="mac-window w-full max-w-sm overflow-hidden">
    <div class="mac-titlebar">
      <span class="mac-dot red"></span>
      <span class="mac-dot yellow"></span>
      <span class="mac-dot green"></span>
      <span class="mac-titlebar-title">TaskFlow — 로그인</span>
    </div>

    <div class="p-8 stagger">
      <div class="flex justify-center mb-2">
        <span class="font-display text-3xl text-slate-900 dark:text-slate-50">TaskFlow</span>
      </div>
      <p class="text-center text-sm text-slate-500 dark:text-slate-400 mb-6">팀의 흐름을 한눈에</p>

      <form id="login-form" class="space-y-3">
        <input id="email" type="email" required placeholder="이메일"
          class="input-mac w-full px-4 py-2.5 text-slate-900 dark:text-slate-50 placeholder:text-slate-400" />
        <input id="password" type="password" required placeholder="비밀번호"
          class="input-mac w-full px-4 py-2.5 text-slate-900 dark:text-slate-50 placeholder:text-slate-400" />

        <label class="flex items-center gap-2 text-sm text-slate-600 dark:text-slate-300 select-none cursor-pointer pt-1">
          <input id="remember-me" type="checkbox" checked
            class="w-4 h-4 rounded accent-[#0a84ff]" />
          로그인 상태 유지
        </label>

        <div id="error-box" class="text-red-500 text-sm min-h-[1.25rem]"></div>

        <button id="submit-btn" type="submit" class="btn-mac btn-mac-primary w-full py-2.5">
          로그인
        </button>
      </form>

      <p class="text-center text-sm text-slate-500 dark:text-slate-400 mt-5">
        계정이 없으신가요? <a href="/signup.html" class="text-[#0a84ff] font-medium">회원가입</a>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/theme.js"></script>
  <script>
    initThemeToggle();

    (async () => {
      await autoLoginRedirectIfPossible();
    })();

    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('error-box');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = '처리 중...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember-me').checked;

      try {
        const data = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password }),
        });
        setToken(data.token, remember);
        location.href = data.user.team_id ? '/app.html' : '/team-select.html';
      } catch (err) {
        errorBox.textContent = err.message;
        submitBtn.disabled = false;
        submitBtn.textContent = '로그인';
      }
    });
  </script>
</body>
</html>
