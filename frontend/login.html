<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>로그인 · TaskFlow</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm bg-white rounded-xl shadow p-8">
    <div class="flex justify-center mb-6">
      <span class="inline-block bg-teal-600 text-white font-bold px-4 py-2 rounded">TaskFlow</span>
    </div>
    <h1 class="text-xl font-bold text-center mb-6">로그인</h1>

    <form id="login-form" class="space-y-4">
      <input id="email" type="email" required placeholder="이메일" class="w-full border border-slate-300 rounded px-3 py-2" />
      <input id="password" type="password" required placeholder="비밀번호" class="w-full border border-slate-300 rounded px-3 py-2" />

      <div id="error-box" class="text-red-600 text-sm min-h-[1.25rem]"></div>

      <button id="submit-btn" type="submit" class="w-full bg-teal-600 text-white rounded py-2 font-semibold hover:bg-teal-700 disabled:bg-slate-400">
        로그인
      </button>
    </form>

    <p class="text-center text-sm text-slate-500 mt-4">
      계정이 없으신가요? <a href="/signup.html" class="text-teal-600 underline">회원가입</a>
    </p>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('error-box');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = '처리 중...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const data = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password }),
        });
        setToken(data.token);
        location.href = data.user.team_id ? '/app.html' : '/team-select.html';
      } catch (err) {
        errorBox.textContent = err.message;
        submitBtn.disabled = false;
        submitBtn.textContent = '로그인';
      }
    });
  </script>
</body>
</html>
