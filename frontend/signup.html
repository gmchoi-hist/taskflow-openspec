<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>회원가입 · TaskFlow</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm bg-white rounded-xl shadow p-8">
    <div class="flex justify-center mb-6">
      <span class="inline-block bg-teal-600 text-white font-bold px-4 py-2 rounded">TaskFlow</span>
    </div>
    <h1 class="text-xl font-bold text-center mb-6">회원가입</h1>

    <form id="signup-form" class="space-y-4">
      <div>
        <input id="email" type="email" required placeholder="이메일 입력" class="w-full border border-slate-300 rounded px-3 py-2" />
        <p id="email-error" class="text-red-600 text-xs mt-1 hidden"></p>
      </div>
      <div>
        <input id="password" type="password" required placeholder="비밀번호 (8자 이상)" class="w-full border border-slate-300 rounded px-3 py-2" />
        <p id="password-error" class="text-red-600 text-xs mt-1 hidden"></p>
      </div>

      <div id="error-box" class="text-red-600 text-sm min-h-[1.25rem]"></div>

      <button id="submit-btn" type="submit" class="w-full bg-teal-600 text-white rounded py-2 font-semibold hover:bg-teal-700 disabled:bg-slate-400">
        가입하기
      </button>
    </form>

    <p class="text-center text-sm text-slate-500 mt-4">
      이미 계정이 있으신가요? <a href="/login.html" class="text-teal-600 underline">로그인</a>
    </p>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const form = document.getElementById('signup-form');
    const errorBox = document.getElementById('error-box');
    const emailError = document.getElementById('email-error');
    const passwordError = document.getElementById('password-error');
    const submitBtn = document.getElementById('submit-btn');

    function clearFieldErrors() {
      emailError.classList.add('hidden');
      passwordError.classList.add('hidden');
      errorBox.textContent = '';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearFieldErrors();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (password.length < 8) {
        passwordError.textContent = '8자 이상 입력해주세요';
        passwordError.classList.remove('hidden');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '처리 중...';

      try {
        const data = await apiFetch('/auth/signup', {
          method: 'POST',
          body: JSON.stringify({ email, password }),
        });
        setToken(data.token);
        location.href = '/team-select.html';
      } catch (err) {
        if (err.code === 'EMAIL_TAKEN') {
          emailError.textContent = err.message;
          emailError.classList.remove('hidden');
        } else {
          errorBox.textContent = err.message;
        }
        submitBtn.disabled = false;
        submitBtn.textContent = '가입하기';
      }
    });
  </script>
</body>
</html>
