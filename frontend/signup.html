<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>회원가입 · TaskFlow</title>
<script>
  (function () {
    var t = localStorage.getItem('theme');
    if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    if (t === 'dark') document.documentElement.classList.add('dark');
  })();
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class' };</script>
<link rel="stylesheet" href="/css/theme.css" />
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <button id="theme-toggle-btn" class="theme-toggle fixed top-5 right-5 z-20" aria-label="테마 전환">🌙</button>

  <div class="mac-window w-full max-w-sm overflow-hidden">
    <div class="mac-titlebar">
      <span class="mac-dot red"></span>
      <span class="mac-dot yellow"></span>
      <span class="mac-dot green"></span>
      <span class="mac-titlebar-title">TaskFlow — 회원가입</span>
    </div>

    <div class="p-8 stagger">
      <div class="flex justify-center mb-2">
        <span class="font-display text-3xl text-slate-900 dark:text-slate-50">TaskFlow</span>
      </div>
      <p class="text-center text-sm text-slate-500 dark:text-slate-400 mb-6">팀을 시작해보세요</p>

      <form id="signup-form" class="space-y-3">
        <div>
          <input id="email" type="email" required placeholder="이메일 입력"
            class="input-mac w-full px-4 py-2.5 text-slate-900 dark:text-slate-50 placeholder:text-slate-400" />
          <p id="email-error" class="text-red-500 text-xs mt-1 hidden"></p>
        </div>
        <div>
          <input id="password" type="password" required placeholder="비밀번호 (8자 이상)"
            class="input-mac w-full px-4 py-2.5 text-slate-900 dark:text-slate-50 placeholder:text-slate-400" />
          <p id="password-error" class="text-red-500 text-xs mt-1 hidden"></p>
        </div>

        <div id="error-box" class="text-red-500 text-sm min-h-[1.25rem]"></div>

        <button id="submit-btn" type="submit" class="btn-mac btn-mac-primary w-full py-2.5">
          가입하기
        </button>
      </form>

      <p class="text-center text-sm text-slate-500 dark:text-slate-400 mt-5">
        이미 계정이 있으신가요? <a href="/login.html" class="text-[#0a84ff] font-medium">로그인</a>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/theme.js"></script>
  <script>
    initThemeToggle();

    (async () => {
      await autoLoginRedirectIfPossible();
    })();

    const form = document.getElementById('signup-form');
    const errorBox = document.getElementById('error-box');
    const emailError = document.getElementById('email-error');
    const passwordError = document.getElementById('password-error');
    const submitBtn = document.getElementById('submit-btn');

    function clearFieldErrors() {
      emailError.classList.add('hidden');
      passwordError.classList.add('hidden');
      errorBox.textContent = '';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearFieldErrors();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (password.length < 8) {
        passwordError.textContent = '8자 이상 입력해주세요';
        passwordError.classList.remove('hidden');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '처리 중...';

      try {
        const data = await apiFetch('/auth/signup', {
          method: 'POST',
          body: JSON.stringify({ email, password }),
        });
        setToken(data.token, true);
        location.href = '/team-select.html';
      } catch (err) {
        if (err.code === 'EMAIL_TAKEN') {
          emailError.textContent = err.message;
          emailError.classList.remove('hidden');
        } else {
          errorBox.textContent = err.message;
        }
        submitBtn.disabled = false;
        submitBtn.textContent = '가입하기';
      }
    });
  </script>
</body>
</html>
