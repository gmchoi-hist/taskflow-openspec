<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>팀 선택 · TaskFlow</title>
<script>
  (function () {
    var t = localStorage.getItem('theme');
    if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    if (t === 'dark') document.documentElement.classList.add('dark');
  })();
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class' };</script>
<link rel="stylesheet" href="/css/theme.css" />
</head>
<body class="min-h-screen p-4 md:p-8">

  <button id="theme-toggle-btn" class="theme-toggle fixed top-5 right-5 z-20" aria-label="테마 전환">🌙</button>

  <header class="glass-panel max-w-3xl mx-auto flex justify-between items-center px-6 py-4 rounded-2xl mb-6 relative z-10">
    <span class="font-display text-xl text-slate-900 dark:text-slate-50">TaskFlow</span>
    <div class="text-sm text-slate-500 dark:text-slate-400">
      <span id="user-email"></span> ·
      <button id="logout-btn" class="text-[#0a84ff] font-medium">로그아웃</button>
    </div>
  </header>

  <main class="max-w-3xl mx-auto relative z-10">
    <div class="mac-window overflow-hidden">
      <div class="mac-titlebar">
        <span class="mac-dot red"></span>
        <span class="mac-dot yellow"></span>
        <span class="mac-dot green"></span>
        <span class="mac-titlebar-title">팀 선택</span>
      </div>

      <div class="p-6 md:p-8">
        <div class="glass-panel text-sm rounded-xl p-4 mb-6 text-slate-600 dark:text-slate-300">
          아직 팀에 소속되지 않았습니다. 팀을 만들거나 초대코드로 합류하세요.
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 stagger">
          <div class="glass-panel rounded-xl p-5">
            <h2 class="font-semibold mb-3 text-slate-900 dark:text-slate-50">+ 새 팀 만들기</h2>
            <form id="create-team-form" class="space-y-3">
              <input id="team-name" required maxlength="30" placeholder="팀 이름 (1-30자)"
                class="input-mac w-full px-4 py-2.5 text-slate-900 dark:text-slate-50 placeholder:text-slate-400" />
              <div id="create-error" class="text-red-500 text-sm min-h-[1.25rem]"></div>
              <button type="submit" class="btn-mac btn-mac-primary w-full py-2.5">만들기</button>
            </form>
          </div>

          <div class="glass-panel rounded-xl p-5">
            <h2 class="font-semibold mb-3 text-slate-900 dark:text-slate-50">초대코드로 합류</h2>
            <form id="join-team-form" class="space-y-3">
              <input id="invite-code" required placeholder="ABCD-1234"
                class="input-mac w-full px-4 py-2.5 uppercase text-slate-900 dark:text-slate-50 placeholder:text-slate-400" />
              <p class="text-xs text-slate-400 dark:text-slate-500">형식: 대문자 4 + 숫자 4 (하이픈 포함)</p>
              <div id="join-error" class="text-red-500 text-sm min-h-[1.25rem]"></div>
              <button type="submit" class="btn-mac py-2.5 w-full" style="background: linear-gradient(180deg, #34d17f, #28c840); color: white; box-shadow: 0 8px 20px -6px rgba(40,200,64,.5);">합류</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/theme.js"></script>
  <script>
    initThemeToggle();

    (async () => {
      if (!requireAuthOrRedirect()) return;
      try {
        const me = await apiFetch('/auth/me');
        if (me.team_id) {
          location.href = '/app.html';
          return;
        }
        document.getElementById('user-email').textContent = me.email;
      } catch (e) {
        // apiFetch already redirects on 401
      }
    })();

    document.getElementById('logout-btn').addEventListener('click', async () => {
      try { await apiFetch('/auth/logout', { method: 'POST' }); } catch (e) {}
      clearToken();
      location.href = '/login.html';
    });

    document.getElementById('create-team-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorBox = document.getElementById('create-error');
      errorBox.textContent = '';
      const name = document.getElementById('team-name').value;
      try {
        await apiFetch('/teams', { method: 'POST', body: JSON.stringify({ name }) });
        location.href = '/app.html';
      } catch (err) {
        errorBox.textContent = err.message;
      }
    });

    document.getElementById('join-team-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorBox = document.getElementById('join-error');
      errorBox.textContent = '';
      const invite_code = document.getElementById('invite-code').value.trim().toUpperCase();
      try {
        await apiFetch('/teams/join', { method: 'POST', body: JSON.stringify({ invite_code }) });
        location.href = '/app.html';
      } catch (err) {
        errorBox.textContent = err.message;
      }
    });
  </script>
</body>
</html>
