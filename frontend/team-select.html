<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>팀 선택 · TaskFlow</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
  <header class="flex justify-between items-center px-6 py-4 bg-white border-b">
    <span class="font-bold text-teal-700">TaskFlow</span>
    <div class="text-sm text-slate-500">
      <span id="user-email"></span> | <button id="logout-btn" class="text-teal-600 underline">로그아웃</button>
    </div>
  </header>

  <main class="max-w-3xl mx-auto p-6">
    <div class="bg-blue-50 text-blue-800 text-sm rounded p-4 mb-6">
      아직 팀에 소속되지 않았습니다. 팀을 만들거나 초대코드로 합류하세요.
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="border border-dashed border-slate-300 rounded p-5">
        <h2 class="font-bold mb-3">+ 새 팀 만들기</h2>
        <form id="create-team-form" class="space-y-3">
          <input id="team-name" required maxlength="30" placeholder="팀 이름 (1-30자)" class="w-full border border-slate-300 rounded px-3 py-2" />
          <div id="create-error" class="text-red-600 text-sm min-h-[1.25rem]"></div>
          <button type="submit" class="w-full bg-teal-700 text-white rounded py-2 font-semibold">만들기</button>
        </form>
      </div>

      <div class="border border-dashed border-slate-300 rounded p-5">
        <h2 class="font-bold mb-3">초대코드로 합류</h2>
        <form id="join-team-form" class="space-y-3">
          <input id="invite-code" required placeholder="ABCD-1234" class="w-full border border-slate-300 rounded px-3 py-2 uppercase" />
          <p class="text-xs text-slate-500">형식: 대문자 4 + 숫자 4 (하이픈 포함)</p>
          <div id="join-error" class="text-red-600 text-sm min-h-[1.25rem]"></div>
          <button type="submit" class="w-full bg-emerald-600 text-white rounded py-2 font-semibold">합류</button>
        </form>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script>
    (async () => {
      if (!requireAuthOrRedirect()) return;
      try {
        const me = await apiFetch('/auth/me');
        if (me.team_id) {
          location.href = '/app.html';
          return;
        }
        document.getElementById('user-email').textContent = me.email;
      } catch (e) {
        // apiFetch already redirects on 401
      }
    })();

    document.getElementById('logout-btn').addEventListener('click', async () => {
      try { await apiFetch('/auth/logout', { method: 'POST' }); } catch (e) {}
      clearToken();
      location.href = '/login.html';
    });

    document.getElementById('create-team-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorBox = document.getElementById('create-error');
      errorBox.textContent = '';
      const name = document.getElementById('team-name').value;
      try {
        await apiFetch('/teams', { method: 'POST', body: JSON.stringify({ name }) });
        location.href = '/app.html';
      } catch (err) {
        errorBox.textContent = err.message;
      }
    });

    document.getElementById('join-team-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorBox = document.getElementById('join-error');
      errorBox.textContent = '';
      const invite_code = document.getElementById('invite-code').value.trim().toUpperCase();
      try {
        await apiFetch('/teams/join', { method: 'POST', body: JSON.stringify({ invite_code }) });
        location.href = '/app.html';
      } catch (err) {
        errorBox.textContent = err.message;
      }
    });
  </script>
</body>
</html>
